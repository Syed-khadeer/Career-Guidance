<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Compass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Career Compass</h1>
    <p>Helping First-Generation Students Navigate Careers</p>
</header>

<main>

    <section class="selector-card">
        <h2>Select a Career</h2>

        <select id="careerSelect">
            <option value="software">Software Engineer</option>
            <option value="ai">AI Engineer</option>
            <option value="doctor">Doctor</option>
            <option value="ca">Chartered Accountant</option>
            <option value="ias">IAS Officer</option>
        </select>
    </section>

    <section id="careerInfo" class="career-card">
    </section>

</main>

<footer>
    <p>Career Compass © 2026</p>
</footer>

<script src="javascript.js"></script>
</body>
</html>
